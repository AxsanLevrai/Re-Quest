<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Re:Quest — Créer ton profil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --accent:#00f5ff;
    --night:#05030f;
    --night2:#0a0818;
    --night3:#100e1f;
    --snow:#e8e6f0;
    --mist:#9896aa;
    --fog:#5a5870;
    --green:#00ff9d;
    --neon-glow:0 0 20px rgba(0,245,255,0.5);
  }
  html,body{min-height:100%;background:var(--night);font-family:'Outfit',sans-serif;color:var(--snow)}
  body{
    background:radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.04) 0%, transparent 60%),
               radial-gradient(ellipse at 80% 20%, rgba(123,95,255,0.06) 0%, transparent 50%),
               linear-gradient(135deg,#05030f 0%,#0a0520 50%,#05030f 100%);
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 20px 80px;
  }
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .container{width:100%;max-width:560px;animation:fadeInUp 0.5s ease both}

  /* Header */
  .header{text-align:center;margin-bottom:40px}
  .header-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(0,245,255,0.07);border:1px solid rgba(0,245,255,0.2);
    border-radius:20px;padding:6px 16px;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);
    margin-bottom:20px;
  }
  .header h1{
    font-family:'Playfair Display',serif;font-size:32px;font-weight:700;
    color:var(--snow);letter-spacing:1px;margin-bottom:8px;
  }
  .header h1 span{color:var(--accent);text-shadow:var(--neon-glow)}
  .header p{font-size:14px;color:var(--mist);line-height:1.6}

  /* Preview card */
  .preview{
    background:rgba(10,8,24,0.9);
    border:1px solid rgba(0,245,255,0.12);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:28px;
    box-shadow:0 12px 40px rgba(0,0,0,0.4);
  }
  .preview-banner{
    height:120px;
    background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(123,95,255,0.2));
    position:relative;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;overflow:hidden;
  }
  .preview-banner:hover{filter:brightness(1.2)}
  .preview-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .banner-hint{
    position:relative;z-index:1;
    font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    color:rgba(255,255,255,0.4);
    display:flex;align-items:center;gap:8px;
  }
  .preview-info{padding:20px 24px;display:flex;align-items:flex-end;gap:16px;margin-top:-32px;position:relative;z-index:1}
  .avatar-wrap{position:relative;flex-shrink:0}
  .avatar{
    width:72px;height:72px;border-radius:50%;
    background:rgba(0,245,255,0.1);border:3px solid var(--night2);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;overflow:hidden;cursor:pointer;
    transition:all 0.2s;
  }
  .avatar:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(0,245,255,0.3)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar-edit{
    position:absolute;bottom:0;right:0;
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:var(--night);
    font-size:11px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-weight:700;
  }
  .preview-meta{flex:1;padding-bottom:4px}
  .preview-pseudo{font-size:20px;font-weight:700;color:var(--snow);font-family:'Playfair Display',serif}
  .preview-pseudo.placeholder{color:var(--fog)}
  .preview-statut{font-size:12px;color:var(--mist);margin-top:2px}
  .preview-statut.placeholder{color:var(--fog);font-style:italic}
  .preview-joined{font-size:11px;color:var(--fog);margin-top:4px;letter-spacing:0.5px}

  /* Form sections */
  .section{
    background:rgba(10,8,24,0.9);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;
    padding:24px;
    margin-bottom:16px;
  }
  .section-title{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--accent);margin-bottom:20px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:rgba(0,245,255,0.15)}

  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fog);display:flex;justify-content:space-between}
  .field label span{color:var(--fog);font-weight:400;letter-spacing:0;text-transform:none;font-size:11px}
  .field input,.field textarea{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    color:var(--snow);
    font-family:'Outfit',sans-serif;font-size:14px;
    padding:11px 15px;
    outline:none;transition:all 0.2s;
    resize:none;
  }
  .field input:focus,.field textarea:focus{
    border-color:rgba(0,245,255,0.4);
    box-shadow:0 0 0 3px rgba(0,245,255,0.07);
    background:rgba(0,245,255,0.03);
  }
  .field input::placeholder,.field textarea::placeholder{color:var(--fog)}
  .char-count{font-size:11px;color:var(--fog);text-align:right;margin-top:4px}

  /* Hidden file inputs */
  #avatar-input,#banner-input{display:none}

  /* Submit */
  .btn-submit{
    width:100%;padding:16px;
    background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(0,245,255,0.08));
    border:1px solid rgba(0,245,255,0.35);
    border-radius:10px;
    color:var(--accent);
    font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase;
    cursor:pointer;transition:all 0.2s;
    text-shadow:0 0 10px rgba(0,245,255,0.4);
    margin-top:8px;
  }
  .btn-submit:hover{background:rgba(0,245,255,0.2);box-shadow:0 0 30px rgba(0,245,255,0.15);transform:translateY(-2px)}
  .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}

  /* Loading overlay */
  .loading-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(5,3,15,0.9);backdrop-filter:blur(8px);
    align-items:center;justify-content:center;flex-direction:column;gap:16px;
  }
  .loading-overlay.visible{display:flex}
  .loader{width:40px;height:40px;border:2px solid rgba(0,245,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;box-shadow:0 0 20px rgba(0,245,255,0.2)}
  .loading-text{font-size:13px;color:var(--mist);letter-spacing:1px}

  .error-msg{
    background:rgba(255,45,107,0.1);border:1px solid rgba(255,45,107,0.25);
    border-radius:8px;padding:12px 16px;
    color:#ff6b8a;font-size:13px;text-align:center;
    margin-top:12px;display:none;
  }
  .error-msg.visible{display:block}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loader"></div>
  <div class="loading-text" id="loading-text">Création du profil...</div>
</div>

<div class="container">
  <div class="header">
    <div class="header-badge">⚔️ Bienvenue, Aventurier</div>
    <h1>Crée ton <span>profil</span></h1>
    <p>Personnalise ton identité avant de commencer ta légende</p>
  </div>

  <!-- Live preview -->
  <div class="preview">
    <div class="preview-banner" id="banner-zone" onclick="document.getElementById('banner-input').click()">
      <img id="banner-preview" src="" alt="" style="display:none">
      <div class="banner-hint">🖼 Clique pour ajouter une bannière</div>
    </div>
    <div class="preview-info">
      <div class="avatar-wrap">
        <div class="avatar" id="avatar-zone" onclick="document.getElementById('avatar-input').click()">
          <img id="avatar-preview" src="" alt="" style="display:none">
          <span id="avatar-emoji">⚔️</span>
        </div>
        <div class="avatar-edit" onclick="document.getElementById('avatar-input').click()">+</div>
      </div>
      <div class="preview-meta">
        <div class="preview-pseudo placeholder" id="prev-pseudo">Ton pseudo...</div>
        <div class="preview-statut placeholder" id="prev-statut">Ton statut...</div>
        <div class="preview-joined">⚔️ Aventurier depuis <span id="prev-date"></span></div>
      </div>
    </div>
  </div>

  <!-- Identité -->
  <div class="section">
    <div class="section-title">Identité</div>
    <div class="field">
      <label>Pseudo <span>* obligatoire</span></label>
      <input type="text" id="pseudo" placeholder="Ton nom de guerrier..." maxlength="30" oninput="updatePreview()">
      <div class="char-count"><span id="pseudo-count">0</span>/30</div>
    </div>
    <div class="field">
      <label>Statut <span>affiché sur ton profil</span></label>
      <input type="text" id="statut" placeholder="En quête de grandeur 🔥" maxlength="60" oninput="updatePreview()">
      <div class="char-count"><span id="statut-count">0</span>/60</div>
    </div>
    <div class="field">
      <label>Biographie</label>
      <textarea id="bio" rows="3" placeholder="Qui es-tu, aventurier ?" maxlength="200" oninput="updateBioCount()"></textarea>
      <div class="char-count"><span id="bio-count">0</span>/200</div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn-submit" onclick="saveProfile()">Commencer l'aventure ⚔️</button>
</div>

<!-- Hidden inputs -->
<input type="file" id="avatar-input" accept="image/*" onchange="handleAvatar(this)">
<input type="file" id="banner-input" accept="image/*" onchange="handleBanner(this)">

<script>
const SUPABASE_URL = 'https://pvucciyqokblpmtitypr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dWNjaXlxb2tibHBtdGl0eXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDQ4MzUsImV4cCI6MjA5MDkyMDgzNX0.1SM1WOaEP3ABa3k9rDT9TEvhXtDTtPi_N69aHm3Pz9A';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let isEditMode = false;
let avatarFile = null;
let bannerFile = null;

// ── Auth check ────────────────────────────────────────────
(async function(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Check if profile already exists
  const { data } = await sb.from('users_profiles').select('*').eq('id', currentUser.id).single();
  if(data) {
    isEditMode = true; window._profileData = data; console.log('PROFILE DATA:', JSON.stringify(data));
    console.log('EDIT MODE - data:', data);
    document.getElementById('pseudo').value = data.pseudo || '';
    document.getElementById('statut').value = data.statut || '';
    document.getElementById('bio').value = data.bio || '';
    if(data.avatar_url) {
      const img = document.getElementById('avatar-preview');
      img.src = data.avatar_url;
      img.style.display = 'block';
      const emoji = document.getElementById('avatar-emoji');
      if(emoji) emoji.style.display = 'none';
    }
    if(data.banniere_url) {
      const img = document.getElementById('banner-preview');
      if(img) {
        img.src = data.banniere_url;
        img.style.display = 'block';
        const hint = document.querySelector('.banner-hint');
        if(hint) hint.style.display = 'none';
      }
    }
    document.querySelector('.btn-submit').textContent = 'Sauvegarder ✨';
    document.querySelector('h1') && (document.querySelector('h1').textContent = 'Modifier mon profil');
    updatePreview();
  }

  // Pre-fill with Google data if available
  const meta = currentUser.user_metadata;
  if(meta?.full_name) {
    document.getElementById('pseudo').value = meta.full_name.split(' ')[0];
    updatePreview();
  }
  if(meta?.avatar_url && !isEditMode) {
    const img = document.getElementById('avatar-preview');
    img.src = meta.avatar_url;
    img.style.display = 'block';
    document.getElementById('avatar-emoji').style.display = 'none';
  }

  // Set date
  document.getElementById('prev-date').textContent = new Date().toLocaleDateString('fr-FR', {month:'long', year:'numeric'});
})();

// ── Live preview update ───────────────────────────────────
function updatePreview() {
  const pseudo = document.getElementById('pseudo').value;
  const statut = document.getElementById('statut').value;
  const prevPseudo = document.getElementById('prev-pseudo');
  const prevStatut = document.getElementById('prev-statut');

  document.getElementById('pseudo-count').textContent = pseudo.length;
  document.getElementById('statut-count').textContent = statut.length;

  if(pseudo) { prevPseudo.textContent = pseudo; prevPseudo.classList.remove('placeholder'); }
  else { prevPseudo.textContent = 'Ton pseudo...'; prevPseudo.classList.add('placeholder'); }

  if(statut) { prevStatut.textContent = statut; prevStatut.classList.remove('placeholder'); }
  else { prevStatut.textContent = 'Ton statut...'; prevStatut.classList.add('placeholder'); }
}

function updateBioCount() {
  document.getElementById('bio-count').textContent = document.getElementById('bio').value.length;
}

// ── Avatar upload ─────────────────────────────────────────
function handleAvatar(input) {
  const file = input.files[0];
  if(!file) return;
  avatarFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('avatar-preview');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('avatar-emoji').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── Banner upload ─────────────────────────────────────────
function handleBanner(input) {
  const file = input.files[0];
  if(!file) return;
  bannerFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('banner-preview');
    img.src = e.target.result;
    img.style.display = 'block';
    document.querySelector('.banner-hint').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── Upload file to Supabase Storage ──────────────────────
async function uploadFile(file, bucket, path) {
  const { data, error } = await sb.storage.from(bucket).upload(path, file, { upsert: true });
  if(error) throw error;
  const { data: urlData } = sb.storage.from(bucket).getPublicUrl(path);
  return urlData.publicUrl;
}

// ── Save profile ──────────────────────────────────────────
async function saveProfile() {
  const pseudo = document.getElementById('pseudo').value.trim();
  if(!pseudo) {
    showError('Un pseudo est obligatoire pour commencer !');
    document.getElementById('pseudo').focus();
    return;
  }

  showLoading('Création du profil...');

  try {
    let avatar_url = (window._profileData && window._profileData.avatar_url) ? window._profileData.avatar_url : '';
    let banniere_url = (window._profileData && window._profileData.banniere_url) ? window._profileData.banniere_url : '';

    // Upload avatar if provided
    if(avatarFile) {
      avatar_url = await uploadFile(avatarFile, 'avatars', `${currentUser.id}/avatar`);
    }

    // Upload banner if provided
    if(bannerFile) {
      banniere_url = await uploadFile(bannerFile, 'banners', `${currentUser.id}/banner`);
    }

    // Create or update profile in DB
    const profileData = {
      pseudo,
      bio: document.getElementById('bio').value.trim(),
      statut: document.getElementById('statut').value.trim() || 'En quête de grandeur 🔥',
      avatar_url,
      banniere_url,
    };
    let error;
    if(isEditMode) {
      ({ error } = await sb.from('users_profiles').update(profileData).eq('id', currentUser.id));
    } else {
      ({ error } = await sb.from('users_profiles').insert({id: currentUser.id, ...profileData}));
    }

    if(error) throw error;

    // Create initial user data record
    await sb.from('users_data').insert({
      id: currentUser.id,
      xp: 0, niveau: 1, hp: 100, streak: 0, streak_best: 0
    });

    showLoading(isEditMode ? 'Profil mis à jour ! ✨' : "C'est parti ! ⚔️");
    setTimeout(() => { window.location.href = 'index.html'; }, 800);

  } catch(err) {
    hideLoading();
    showError('Erreur : ' + (err.message || 'Réessaie.'));
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('visible');
}
function showLoading(txt) {
  document.getElementById('loading-text').textContent = txt || 'Chargement...';
  document.getElementById('loading-overlay').classList.add('visible');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('visible');
}
</script>
</body>
</html>
